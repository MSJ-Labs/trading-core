apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus
    access: proxy   # Grafana backend calls Prometheus — browser never talks to it directly
    url: http://prometheus:9090
    isDefault: true

  - name: Loki
    type: loki
    uid: loki
    access: proxy
    url: http://loki:3100

  - name: Tempo
    type: tempo
    uid: tempo
    access: proxy
    url: http://tempo:3200
    jsonData:
      # Links traces → logs: when viewing a trace in Tempo, Grafana adds a "Logs" link
      # that opens Loki filtered by the same traceId
      tracesToLogsV2:
        datasourceUid: loki
        spanStartTimeShift: '-1m'
        spanEndTimeShift: '1m'
        filterByTraceID: true
        filterBySpanID: false
        customQuery: false
      # Links traces → metrics: lets you jump from a slow span to the Prometheus graph
      tracesToMetrics:
        datasourceUid: prometheus
      nodeGraph:
        enabled: true   # Shows a service dependency graph from trace data