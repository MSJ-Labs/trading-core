auth_enabled: false   # No multi-tenancy — fine for local dev

server:
  http_listen_port: 3100
  grpc_listen_port: 9096

# "common" block: shared defaults for all Loki components running in single-binary mode
common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory   # No external KV store (etcd/consul) needed locally

query_range:
  results_cache:
    cache:
      embedded_cache:
        enabled: true
        max_size_mb: 100

# Schema: tells Loki which storage backend and index format to use
# v13 + tsdb is the current recommended config for Loki 3.x
schema_config:
  configs:
    - from: 2020-10-24
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  allow_structured_metadata: false   # Disable OTLP structured metadata (not needed locally)

analytics:
  reporting_enabled: false   # Don't send usage stats to Grafana Labs