apiVersion: apps/v1
kind: Deployment
metadata:
  name: trading-core
spec:
  replicas: 2
  selector:
    matchLabels:
      app: trading-core
  template:
    metadata:
      labels:
        app: trading-core
    spec:
      containers:
        - name: trading-core
          image: trading-core:runtime
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: trading-core-config
            - secretRef:
                name: trading-core-secret
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          startupProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            periodSeconds: 5
            failureThreshold: 60
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            periodSeconds: 10