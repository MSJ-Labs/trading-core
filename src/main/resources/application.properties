# Spring Boot Application Properties

# Server Configuration
server.port=8080
server.servlet.context-path=/
spring.application.name=trading-core

# PostgreSQL Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/trading_core
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration (Disabled - Using JOOQ instead)
# Note: Even though we use JOOQ, we keep spring-boot-starter-data-jpa for transaction management
# DDL-auto is set to NONE - all schema changes managed via Flyway migrations
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

# JOOQ Configuration
spring.jooq.sql-dialect=POSTGRES

# Flyway Migration Configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true

# Kafka Configuration
kafka.bootstrap-servers=localhost:9092
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.acks=all
spring.kafka.producer.retries=3
spring.kafka.producer.compression-type=snappy
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=trading-core-group
spring.kafka.consumer.auto-offset-reset=earliest

# Jackson Configuration
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.serialization.indent-output=true

# Logging Configuration
logging.level.root=INFO
logging.level.com.msj=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.kafka=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# JWT Configuration
jwt.secret=${JWT_SECRET:your-very-long-secret-key-minimum-256-bits-for-security-change-in-production}
jwt.expiration=${JWT_EXPIRATION:3600000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:86400000}

# Security Configuration
spring.security.user.name=admin
spring.security.user.password=admin123

