# ============================================================
# Server
# ============================================================
server.port=8080
spring.application.name=iris
spring.threads.virtual.enabled=true

# ============================================================
# PostgreSQL
# ============================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/iris
spring.datasource.username=postgres
spring.datasource.password=
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP
# Pool size = (db_core_count * 2) + 1, per HikariCP's own sizing guidance — tied to
# the Postgres server's CPU cores, not app thread count (virtual threads don't change
# this). Kept small in dev on purpose: a connection leak fails fast as a pool-timeout
# here instead of only surfacing under real concurrency in prod.
spring.datasource.hikari.pool-name=iris-hikari
spring.datasource.hikari.maximum-pool-size=${HIKARI_MAX_POOL_SIZE:5}
spring.datasource.hikari.minimum-idle=${HIKARI_MIN_IDLE:5}
spring.datasource.hikari.connection-timeout=${HIKARI_CONNECTION_TIMEOUT_MS:5000}
spring.datasource.hikari.max-lifetime=${HIKARI_MAX_LIFETIME_MS:1800000}

# JOOQ
spring.jooq.sql-dialect=POSTGRES

# ============================================================
# Flyway
# ============================================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.schemas=auth
spring.flyway.default-schema=auth
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true

# ============================================================
# JWT
# ============================================================
jwt.secret=${JWT_SECRET}
jwt.access-token-expiration-ms=${JWT_ACCESS_EXPIRATION_MS:900000}
jwt.refresh-token-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}

# ============================================================
# Cookie Security
# secure=false in dev (HTTP). Set to true in prod (HTTPS only).
# ============================================================
app.security.cookie.secure=${COOKIE_SECURE:false}
app.security.cookie.domain=${COOKIE_DOMAIN:}

# ============================================================
# Jackson
# ============================================================
spring.jackson.serialization.write-dates-as-timestamps=false

# ============================================================
# Logging
# ============================================================
logging.level.com.msj=INFO
logging.level.com.msj.marketdata.infrastructure.adapters.binance=WARN
logging.level.org.springframework.security=INFO
logging.level.org.springframework.web=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ============================================================
# Validation
# ============================================================
spring.mvc.problem-details.enabled=true

# ============================================================
# CoinGecko (Layer 3 — market data REST)
# ============================================================
coingecko.base-url=https://api.coingecko.com
coingecko.api-key=${COINGECKO_API_KEY:}
coingecko.top-coins-limit=250

# ============================================================
# Binance WebSocket (Layer 3 — real-time price streaming)
# ============================================================
binance.websocket-url=wss://stream.binance.com:9443/stream
binance.default-symbols=btcusdt,ethusdt,solusdt,bnbusdt,xrpusdt,adausdt,dogeusdt,avaxusdt

# ============================================================
# Kafka (Layer 5 — price tick event streaming)
# ============================================================
spring.kafka.bootstrap-servers=localhost:9092

# Idempotent producer: safe retries without duplicate writes on the broker side
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.acks=all
spring.kafka.producer.properties.enable.idempotence=true

spring.kafka.consumer.group-id=trading-core
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# ErrorHandlingDeserializer wraps the real (delegate) deserializer: a malformed/poison
# record fails here instead of throwing inside the listener, so the container isn't killed
# and @RetryableTopic can route the record to the DLT like any other listener failure.
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.msj.marketdata.domain

# ============================================================
# MongoDB (Layer 5 — price tick + OHLCV candle persistence)
# ============================================================
spring.data.mongodb.uri=mongodb://localhost:27017/trading_core

# ============================================================
# Actuator (Layer 9 — metrics endpoint for Prometheus)
# ============================================================
# Endpoints are locked by default — must explicitly expose each one
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always
# Adds application="iris" label to every metric — essential for multi-service Grafana filtering
management.metrics.tags.application=${spring.application.name}

# ============================================================
# Tracing (Layer 9 — OTel spans → Tempo via OTLP/HTTP)
# ============================================================
# 1.0 = 100% sampling. Use 0.1 in production to reduce overhead.
management.tracing.sampling.probability=1.0
# Tempo listens on port 4318 for OTLP/HTTP
management.otlp.tracing.endpoint=http://localhost:4318/v1/traces

# ============================================================
# Loki (Layer 9 — Logback appender push URL)
# ============================================================
# Overridden in logback-spring.xml via <springProperty>
loki.url=http://localhost:3100