# ============================================================
# Server
# ============================================================
server.port=8080
spring.application.name=iris

# ============================================================
# PostgreSQL
# ============================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/iris
spring.datasource.username=postgres
spring.datasource.password=
spring.datasource.driver-class-name=org.postgresql.Driver

# JOOQ
spring.jooq.sql-dialect=POSTGRES

# ============================================================
# Flyway
# ============================================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true

# ============================================================
# JWT
# ============================================================
jwt.secret=${JWT_SECRET:change-me-in-production-min-512-bits-long-secret-key-for-hs512}
jwt.access-token-expiration-ms=${JWT_ACCESS_EXPIRATION_MS:900000}
jwt.refresh-token-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}

# ============================================================
# Cookie Security
# secure=false in dev (HTTP). Set to true in prod (HTTPS only).
# ============================================================
app.security.cookie.secure=${COOKIE_SECURE:false}
app.security.cookie.domain=${COOKIE_DOMAIN:}

# ============================================================
# Jackson
# ============================================================
spring.jackson.serialization.write-dates-as-timestamps=false

# ============================================================
# Logging
# ============================================================
logging.level.com.msj=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.springframework.web=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ============================================================
# Validation
# ============================================================
spring.mvc.problem-details.enabled=true